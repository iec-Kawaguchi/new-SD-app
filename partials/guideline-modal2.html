<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <title>募集要項登録</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

        <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
        <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
        <script src="../js/role-visibility.js"></script>
        <script src="../js/components/toggle-switch.js"></script>

        <style>
            custom-toggle { display: inline-block; }
            ::-webkit-scrollbar { width: 6px; height: 6px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
            ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }

            .ql-toolbar.ql-snow {
                border-color: #d1d5db !important;
                border-top-left-radius: 0.5rem;
                border-top-right-radius: 0.5rem;
                background-color: #f9fafb;
                padding: 8px !important;
            }
            .ql-container.ql-snow {
                border-color: #d1d5db !important;
                border-bottom-left-radius: 0.5rem;
                border-bottom-right-radius: 0.5rem;
                background-color: #fff;
                font-family: 'Noto Sans JP', sans-serif !important;
            }
            .ql-editor {
                min-height: 150px;
                font-size: 0.875rem;
                line-height: 1.6;
                color: #374151;
            }
            .ql-editor.ql-blank::before {
                color: #9ca3af;
                font-style: normal;
            }
            .info-box {
                border-left: 4px solid #06b6d4;
                background-color: #ecfeff;
                padding: 1rem;
                margin: 1rem 0;
                border-radius: 0 0.375rem 0.375rem 0;
                font-weight: bold;
                color: #0e7490;
            }
        </style>
    </head>
    <body class="bg-gray-50 text-gray-900 antialiased">
        <div class="min-h-dvh flex flex-col">

        <header class="sticky top-0 z-20 bg-white/95 backdrop-blur-sm border-b border-gray-100 px-6 py-4">
            <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-600">description</span>
                    <h1 class="text-lg font-bold text-gray-800 tracking-tight">募集要項登録</h1>
                </div>
                <!-- ロール切替（モックのみ） -->
                <div class="relative">
                    <select id="role-select" class="appearance-none pl-3 pr-8 py-1.5 rounded-md border border-gray-300 bg-gray-50 text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                        <option value="iec">IEC (管理者)</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 text-sm pointer-events-none">expand_more</span>
                </div>
            </div>
            <p class="text-xs text-gray-500 ml-8">本募集の募集要項を登録してください。複数ある場合は項目を追加して管理できます。</p>
        </header>

        <main class="flex-1 px-6 py-6 space-y-6 pb-32 max-w-5xl mx-auto w-full">

            <section class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="bg-gray-50/50 px-5 py-3 border-b border-gray-100 flex items-center justify-between">
                    <h2 class="text-sm font-bold text-gray-700 flex items-center gap-2">
                        <span class="material-symbols-outlined text-gray-400" style="font-size: 1.25rem;">article</span>
                        募集詳細
                    </h2>
                    <span id="item-count-badge" class="text-xs text-gray-500 tabular-nums">0 / 10件</span>
                </div>

                <div class="p-6">
                    <p class="text-xs text-gray-500 mb-4">概要・対象などを項目ごとに分けて入力してください。</p>

                    <div id="guidelines-container" class="space-y-6"></div>

                    <!-- 上限到達メッセージ -->
                    <p id="limit-message" class="hidden mt-4 text-xs text-amber-600 flex items-center gap-1">
                        <span class="material-symbols-outlined" style="font-size: 1rem;">info</span>
                        項目数が上限（10件）に達しています。
                    </p>

                    <!-- 追加ボタン -->
                    <button type="button" id="btn-add" onclick="addGuideline()"
                        class="mt-6 w-full py-3 rounded-lg border-2 border-dashed border-gray-300 text-sm font-bold text-gray-500 hover:text-blue-600 hover:border-blue-400 hover:bg-blue-50/50 transition-all flex items-center justify-center gap-1">
                        <span class="material-symbols-outlined" style="font-size: 1.25rem;">add</span>
                        項目を追加する
                    </button>
                </div>
            </section>

        </main>

        <div class="fixed bottom-0 inset-x-0 z-50 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="mx-auto px-6 py-4 flex items-center justify-end gap-3 max-w-5xl">
                <button class="px-5 py-2.5 rounded-lg border border-gray-300 bg-white text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors">
                    キャンセル
                </button>
                <button onclick="submitMock()" class="px-6 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 shadow-sm hover:shadow active:scale-[0.98] transition-all flex items-center">
                    <span>登録する</span>
                </button>
            </div>
        </div>
        </div>

        <script>
            // --- Quill設定: カスタムブロック ---
            const Block = Quill.import('blots/block');
            class InfoBox extends Block {
                static create(value) {
                    const node = super.create();
                    node.setAttribute('class', 'info-box');
                    return node;
                }
            }
            InfoBox.blotName = 'info-box';
            InfoBox.tagName = 'div';
            Quill.register(InfoBox);

            const toolbarOptions = {
                container: [
                    [{ 'header': [2, 3, false] }],
                    ['bold', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'color': [] }, { 'background': [] }],
                    ['info-box'],
                    ['link', 'clean']
                ],
                handlers: {
                    'info-box': function() { this.quill.format('info-box', true); }
                }
            };

            const guidelinesContainer = document.getElementById('guidelines-container');
            let guidelinesData = [];
            const MAX_ITEMS = 10;

            function updateItemCount() {
                const count = guidelinesData.length;
                document.getElementById('item-count-badge').textContent = `${count} / ${MAX_ITEMS}件`;
                const atLimit = count >= MAX_ITEMS;
                document.getElementById('limit-message').classList.toggle('hidden', !atLimit);
                const btn = document.getElementById('btn-add');
                btn.disabled = atLimit;
                btn.classList.toggle('opacity-40', atLimit);
                btn.classList.toggle('cursor-not-allowed', atLimit);
            }

            // セット（タイトル + 申込期間情報 + 申込の流れ + 募集要項Quill + 補助制度概要Table）を追加
            function addGuideline() {
                if (guidelinesData.length >= MAX_ITEMS) return;
                const id = `guideline-${Date.now()}`;

                const wrapper = document.createElement('div');
                wrapper.className = 'bg-gray-50 border border-gray-200 rounded-xl overflow-hidden';
                wrapper.dataset.itemId = id;
                wrapper.innerHTML = `
                    <!-- カードヘッダー -->
                    <div class="bg-gray-100/80 px-4 py-2.5 border-b border-gray-200 flex items-center justify-between">
                        <span class="text-xs font-bold text-gray-500">項目 #<span class="item-index"></span></span>
                        <div class="flex items-center gap-2">
                            <button type="button" onclick="previewGuideline('${id}')"
                                class="text-gray-400 hover:text-blue-500 transition-colors p-1 rounded hover:bg-blue-50 flex items-center gap-1 text-xs font-bold"
                                title="別タブでプレビュー">
                                <span class="material-symbols-outlined" style="font-size: 1rem;">open_in_new</span>
                                プレビュー
                            </button>
                            <button type="button" onclick="removeGuideline('${id}')"
                                class="text-gray-400 hover:text-red-500 transition-colors p-1 rounded hover:bg-red-50 flex items-center gap-1 text-xs font-bold"
                                title="この項目を削除">
                                <span class="material-symbols-outlined" style="font-size: 1rem;">delete</span>
                                削除
                            </button>
                        </div>
                    </div>

                    <div class="p-5 space-y-5">
                        <!-- タイトルフィールド -->
                        <div class="flex flex-col md:flex-row gap-4">
                            <div class="flex-1">
                                <label for="internal-${id}" class="block text-xs font-bold text-gray-700 mb-1 flex items-center gap-1">
                                    <span class="material-symbols-outlined text-gray-400" style="font-size: 1rem;">settings</span>
                                    内部管理用名称 <span class="text-red-500">*</span>
                                </label>
                                <input type="text" id="internal-${id}"
                                    class="h-9 w-full rounded border border-gray-300 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white placeholder-gray-400"
                                    placeholder="例）26新卒向け（※ユーザーには見えません）">
                            </div>
                            <div class="flex-1">
                                <label for="title-${id}" class="block text-xs font-bold text-gray-700 mb-1 flex items-center gap-1">
                                    <span class="material-symbols-outlined text-gray-400" style="font-size: 1rem;">visibility</span>
                                    公開タイトル <span class="text-red-500">*</span>
                                </label>
                                <input type="text" id="title-${id}"
                                    class="h-9 w-full rounded border border-gray-300 px-3 text-sm font-bold text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white placeholder-gray-400"
                                    placeholder="例）2026年度 新入社員研修 概要">
                            </div>
                        </div>

                        <!-- 募集要項（リッチテキスト） -->
                        <div>
                            <label class="block text-xs font-bold text-gray-700 mb-2 flex items-center gap-1">
                                <span class="material-symbols-outlined text-blue-500" style="font-size: 1rem;">text_fields</span>
                                募集要項
                            </label>
                            <div class="bg-white">
                                <div id="editor-${id}"></div>
                            </div>
                        </div>

                        <!-- 補助制度概要（テーブル） -->
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-xs font-bold text-gray-700 flex items-center gap-1">
                                    <span class="material-symbols-outlined text-green-600" style="font-size: 1rem;">table</span>
                                    補助制度概要
                                </label>
                                <custom-toggle id="toggle-subsidy-${id}" checked="true" label-on="ON" label-off="OFF"></custom-toggle>
                            </div>
                            <div id="subsidy-body-${id}" class="bg-white border border-gray-200 rounded-lg overflow-hidden">
                                <!-- テーブルヘッダー -->
                                <div class="flex items-center gap-0 bg-gray-50 border-b border-gray-200 px-3 py-2">
                                    <span class="text-xs font-bold text-gray-500 w-2/5">項目名</span>
                                    <span class="text-xs font-bold text-gray-500 flex-1">内容</span>
                                    <span class="w-8"></span>
                                </div>
                                <!-- テーブル行 -->
                                <div id="table-rows-${id}" class="divide-y divide-gray-100"></div>
                                <!-- 行追加ボタン -->
                                <div class="px-3 py-2 border-t border-gray-100 bg-gray-50/50">
                                    <button type="button" onclick="addTableRow('${id}')"
                                        class="flex items-center gap-1 text-xs font-bold text-green-600 hover:text-green-800 transition-colors">
                                        <span class="material-symbols-outlined" style="font-size: 1rem;">add_circle</span>
                                        行を追加
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- 申込期間情報 -->
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-xs font-bold text-gray-700 flex items-center gap-1">
                                    <span class="material-symbols-outlined text-blue-500" style="font-size: 1rem;">calendar_today</span>
                                    申込期間情報
                                </label>
                                <custom-toggle id="toggle-period-${id}" checked="true" label-on="ON" label-off="OFF"></custom-toggle>
                            </div>
                        </div>

                        <!-- 申込の流れ -->
                        <div>
                            <div class="flex items-center justify-between mb-2">
                                <label class="text-xs font-bold text-gray-700 flex items-center gap-1">
                                    <span class="material-symbols-outlined text-violet-500" style="font-size: 1rem;">alt_route</span>
                                    申込の流れ
                                </label>
                                <custom-toggle id="toggle-flow-${id}" checked="true" label-on="ON" label-off="OFF"></custom-toggle>
                            </div>
                            <div id="flow-type-options-${id}" class="bg-white border border-gray-200 rounded-lg px-4 py-3 flex items-center gap-4">
                                <label class="flex items-center gap-1.5 cursor-pointer text-sm text-gray-700 hover:text-violet-700">
                                    <input type="radio" name="flow-type-${id}" value="A" checked class="accent-violet-600 w-4 h-4"> タイプA
                                </label>
                                <label class="flex items-center gap-1.5 cursor-pointer text-sm text-gray-700 hover:text-violet-700">
                                    <input type="radio" name="flow-type-${id}" value="B" class="accent-violet-600 w-4 h-4"> タイプB
                                </label>
                                <label class="flex items-center gap-1.5 cursor-pointer text-sm text-gray-700 hover:text-violet-700">
                                    <input type="radio" name="flow-type-${id}" value="C" class="accent-violet-600 w-4 h-4"> タイプC
                                </label>
                            </div>
                        </div>
                    </div>
                `;
                guidelinesContainer.appendChild(wrapper);

                // custom-toggle の change イベント（connectedCallback 後に登録）
                wrapper.querySelector(`#toggle-flow-${id}`).addEventListener('change', e => {
                    wrapper.querySelector(`#flow-type-options-${id}`).classList.toggle('hidden', !e.detail.checked);
                });
                wrapper.querySelector(`#toggle-subsidy-${id}`).addEventListener('change', e => {
                    wrapper.querySelector(`#subsidy-body-${id}`).classList.toggle('hidden', !e.detail.checked);
                });

                const quill = new Quill(`#editor-${id}`, {
                    theme: 'snow',
                    modules: { toolbar: toolbarOptions },
                    placeholder: '募集要項の詳細を入力してください...'
                });

                guidelinesData.push({ id, wrapper, quillInstance: quill });
                updateItemCount();
                updateIndexLabels();
            }

            // テーブル行を追加
            function addTableRow(guidelineId) {
                const container = document.getElementById(`table-rows-${guidelineId}`);
                const rowId = `row-${Date.now()}`;
                const row = document.createElement('div');
                row.className = 'flex items-center gap-0 px-3 py-2';
                row.dataset.rowId = rowId;
                row.innerHTML = `
                    <input type="text"
                        class="h-8 w-2/5 rounded border border-gray-300 px-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white placeholder-gray-400 mr-2"
                        placeholder="例）対象者">
                    <input type="text"
                        class="h-8 flex-1 rounded border border-gray-300 px-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 bg-white placeholder-gray-400 mr-2"
                        placeholder="例）入社1〜3年目の社員">
                    <button type="button" onclick="removeTableRow(this)"
                        class="text-gray-400 hover:text-red-500 transition-colors p-1 rounded hover:bg-red-50 shrink-0 w-8 flex items-center justify-center"
                        title="この行を削除">
                        <span class="material-symbols-outlined" style="font-size: 1.1rem;">remove_circle</span>
                    </button>
                `;
                container.appendChild(row);
            }

            function removeTableRow(btn) {
                btn.closest('[data-row-id]').remove();
            }

            function removeGuideline(id) {
                const index = guidelinesData.findIndex(item => item.id === id);
                if (index > -1) {
                    guidelinesData[index].wrapper.remove();
                    guidelinesData.splice(index, 1);
                    updateItemCount();
                    updateIndexLabels();
                }
            }

            // 「項目 #N」の番号を振り直す
            function updateIndexLabels() {
                guidelinesData.forEach((item, i) => {
                    const label = item.wrapper.querySelector('.item-index');
                    if (label) label.textContent = i + 1;
                });
            }

            document.addEventListener('DOMContentLoaded', () => {
                addGuideline();

                if (!new URLSearchParams(location.search).get('role')) {
                    if (typeof RoleMock !== 'undefined') RoleMock.setRoleInUrl('iec');
                }
                if (typeof RoleMock !== 'undefined') RoleMock.init({ roleSelect: '#role-select' });
            });

            function escapeHtml(str) {
                return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            }

            function previewGuideline(id) {
                const item = guidelinesData.find(g => g.id === id);
                if (!item) return;

                const publicTitle = document.getElementById(`title-${id}`)?.value || '（タイトル未入力）';
                const richtextBody = item.quillInstance.root.innerHTML;

                const showSubsidy = document.getElementById(`toggle-subsidy-${id}`)?.checked ?? true;
                const showPeriod = document.getElementById(`toggle-period-${id}`)?.checked ?? true;
                const showFlow = document.getElementById(`toggle-flow-${id}`)?.checked ?? true;
                const flowType = document.querySelector(`input[name="flow-type-${id}"]:checked`)?.value || 'A';

                const tableRows = [...document.getElementById(`table-rows-${id}`).querySelectorAll('[data-row-id]')].map(row => {
                    const inputs = row.querySelectorAll('input');
                    return { label: inputs[0].value, value: inputs[1].value };
                });

                let subsidyHtml = '';
                if (showSubsidy) {
                    const rowsHtml = tableRows.length > 0
                        ? tableRows.map((row, i) => `
                            <tr${i % 2 === 1 ? ' class="bg-slate-50/60"' : ''}>
                                <td class="px-4 py-3 font-semibold text-slate-900">${escapeHtml(row.label)}</td>
                                <td class="px-4 py-3">${escapeHtml(row.value)}</td>
                            </tr>`).join('')
                        : `<tr><td colspan="2" class="px-4 py-3 text-slate-400 text-sm">（行が登録されていません）</td></tr>`;
                    subsidyHtml = `
                        <div class="rounded-3xl bg-white shadow-sm border border-slate-100 p-6 sm:p-8">
                            <div class="flex items-center gap-2 mb-4">
                                <span class="w-1.5 h-6 rounded-full bg-emerald-500"></span>
                                <h2 class="text-xl font-bold text-slate-900">補助制度の概要</h2>
                            </div>
                            <div class="overflow-hidden rounded-2xl border border-slate-100">
                                <table class="w-full text-sm text-slate-700">
                                    <thead class="bg-slate-50 text-slate-500 text-xs tracking-wide">
                                        <tr>
                                            <th class="px-4 py-3 text-left font-semibold">項目</th>
                                            <th class="px-4 py-3 text-left font-semibold">内容</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">${rowsHtml}</tbody>
                                </table>
                            </div>
                        </div>`;
                }

                const periodHtml = showPeriod ? `
                    <div class="rounded-3xl bg-white shadow-sm border border-slate-100 p-6 sm:p-8">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-1.5 h-6 rounded-full bg-sky-500"></span>
                            <h2 class="text-xl font-bold text-slate-900">申込期間情報</h2>
                        </div>
                        <p class="text-sm text-slate-400">（実際の募集に設定された申込期間情報が表示されます）</p>
                    </div>` : '';

                const flowTypeLabel = { A: 'タイプA', B: 'タイプB', C: 'タイプC' }[flowType] || 'タイプA';
                const flowHtml = showFlow ? `
                    <div class="rounded-3xl bg-white shadow-sm border border-slate-100 p-6 sm:p-8">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-1.5 h-6 rounded-full bg-violet-500"></span>
                            <h2 class="text-xl font-bold text-slate-900">申込の流れ（${escapeHtml(flowTypeLabel)}）</h2>
                        </div>
                        <p class="text-sm text-slate-400">（${escapeHtml(flowTypeLabel)}のフローが表示されます）</p>
                    </div>` : '';

                const html = `<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>プレビュー：${escapeHtml(publicTitle)}</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<script src="https://cdn.tailwindcss.com"><\/script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<style>
body { font-family: "Noto Sans JP", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
.ql-editor { padding: 0; border: none; }
.ql-container.ql-snow { border: none; }
.info-box { border-left: 4px solid #06b6d4; background-color: #ecfeff; padding: 1rem; margin: 1rem 0; border-radius: 0 0.375rem 0.375rem 0; font-weight: bold; color: #0e7490; }
</style>
</head>
<body class="bg-gray-50 text-slate-800">
<div class="sticky top-0 z-50 bg-amber-50 border-b border-amber-200 px-4 py-2 text-xs text-amber-700 text-center font-medium">
    ⚠ これはプレビューです。実際の募集サイトの表示とは異なる場合があります。
</div>
<main class="max-w-5xl mx-auto px-4 sm:px-6 pb-16">
    <section class="mt-8">
        <div class="relative overflow-hidden rounded-3xl bg-gradient-to-br from-indigo-600 via-violet-600 to-sky-500 shadow-xl text-white p-8 sm:p-10">
            <h1 class="text-3xl sm:text-4xl font-extrabold leading-tight tracking-tight">${escapeHtml(publicTitle)}</h1>
        </div>
    </section>
    <section class="mt-10 space-y-8">
        <div class="rounded-3xl bg-white shadow-sm border border-slate-100 p-6 sm:p-8">
            <div class="flex items-center gap-2 mb-4">
                <span class="w-1.5 h-6 rounded-full bg-indigo-500"></span>
                <h2 class="text-xl font-bold text-slate-900">募集要項</h2>
            </div>
            <div class="text-sm leading-relaxed text-slate-700 ql-editor">${richtextBody}</div>
        </div>
        ${subsidyHtml}
        ${periodHtml}
        ${flowHtml}
    </section>
</main>
</body>
</html>`;

                const tab = window.open('', '_blank');
                if (tab) {
                    tab.document.write(html);
                    tab.document.close();
                }
            }

            function submitMock() {
                const details = guidelinesData.map(item => ({
                    internalName: document.getElementById(`internal-${item.id}`)?.value || '',
                    displayTitle: document.getElementById(`title-${item.id}`)?.value || '',
                    showApplicationPeriod: document.getElementById(`toggle-period-${item.id}`)?.checked ?? true,
                    showApplicationFlow: document.getElementById(`toggle-flow-${item.id}`)?.checked ?? true,
                    applicationFlowType: document.querySelector(`input[name="flow-type-${item.id}"]:checked`)?.value || 'A',
                    richtext: item.quillInstance.root.innerHTML,
                    showSubsidyTable: document.getElementById(`toggle-subsidy-${item.id}`)?.checked ?? true,
                    tableRows: [...document.getElementById(`table-rows-${item.id}`).querySelectorAll('[data-row-id]')].map(row => {
                        const inputs = row.querySelectorAll('input');
                        return { label: inputs[0].value, value: inputs[1].value };
                    })
                }));
                console.log('送信データ:', details);
                alert('コンソールに送信データを出力しました。F12キー等でご確認ください。');
            }
        </script>
    </body>
</html>
