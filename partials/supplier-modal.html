<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<title>参加団体登録</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script src="https://cdn.tailwindcss.com"></script>
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="./css/base-style.css">
		<script src="../js/role-visibility.js"></script>
		<script src="../js/components/combobox.js"></script>
		<script src="../js/modal-readonly.js"></script>
	<script src="../js/components/segment-control.js" defer></script>

		<style>
			::-webkit-scrollbar { width: 6px; height: 6px; }
			::-webkit-scrollbar-track { background: transparent; }
			::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
			::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
		</style>
	</head>
	<body class="bg-gray-50 text-gray-900 antialiased">
		<div class="min-h-dvh flex flex-col">

		<header class="sticky top-0 z-10 bg-white/95 backdrop-blur-sm border-b border-gray-100 px-6 py-4">
			<div class="flex items-center justify-between">
				<div>
					<div class="flex items-center gap-2 mb-1">
						<span class="material-symbols-outlined text-blue-600">domain_add</span>
						<h1 class="text-lg font-bold text-gray-800 tracking-tight">参加団体登録</h1>
					</div>
					<p class="text-xs text-gray-500 ml-8">本募集の参加団体情報を登録してください。</p>
				</div>

				<!-- ロール切替（モックのみ） -->
				<div class="relative">
					<select id="role-select" class="appearance-none pl-3 pr-8 py-1.5 rounded-md border border-gray-300 bg-gray-50 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
						<option value="iec">IEC (管理者)</option>
						<option value="supplier">他団体</option>
						<option value="customer">顧客</option>
					</select>
					<span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 text-sm pointer-events-none">expand_more</span>
				</div>
			</div>
		</header>

		<main class="flex-1 px-6 py-6 space-y-8 pb-32">

			<!-- 追加フォーム（IECのみ） -->
			<section data-visible-for="iec" class="bg-white rounded-xl shadow-sm border border-gray-200">
				<div class="bg-gray-50/50 px-5 py-3 border-b border-gray-100 flex items-center justify-between rounded-t-xl">
					<h2 class="text-sm font-bold text-gray-700 flex items-center gap-2">
						<span class="material-symbols-outlined icon-md text-gray-400">add_circle</span>
						団体担当を追加
					</h2>
				</div>
				<div class="p-5 space-y-4">
					<!-- セグメントコントロール: 参加団体あり / 参加団体なし -->
					<div class="flex items-center gap-3">
						<span class="text-xs font-bold text-gray-600">参加団体の有無</span>
						<segment-control id="vendor-seg" name="vendor-mode" value="has-vendor" options="has-vendor:参加団体あり, no-vendor:参加団体なし"></segment-control>
					</div>

					<!-- 参加団体なし時のメッセージ -->
					<div id="no-vendor-notice" class="hidden items-center gap-2 text-sm text-amber-700 bg-amber-50 border border-amber-200 rounded-lg px-4 py-3">
						<span class="material-symbols-outlined text-amber-500" style="font-size:1.1rem">info</span>
						この募集は他団体の参加がなく、IEC 単独で進行します。
					</div>

					<!-- 追加フォーム -->
					<div id="vendor-add-form" class="flex flex-col md:flex-row gap-4 items-end">

					<div class="flex flex-col gap-1.5 flex-1 min-w-[200px]">
						<label class="text-xs font-bold text-gray-700 uppercase tracking-wide">団体</label>
						<div id="org-combobox"></div>
					</div>

					<div class="flex flex-col gap-1.5 flex-1 min-w-[200px]">
						<label class="text-sm font-bold text-gray-700 uppercase tracking-wide">担当者</label>
						<div id="contact-combobox"></div>
					</div>

					<button id="add-btn" class="h-10 w-full md:w-auto shrink-0 rounded-lg bg-blue-600 px-5 text-white text-sm font-bold hover:bg-blue-700 hover:shadow active:scale-[0.98] transition-all flex items-center justify-center gap-2">
						<span class="material-symbols-outlined icon-sm">add</span>
						追加
					</button>
					</div>
				</div>
			</section>

			<!-- IEC編集モード：登録済みリスト -->
			<section data-visible-for="iec" id="vendor-list-section">
				<h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wide px-1 flex items-center gap-2">
					登録済み担当者
				</h2>
				<div id="cards" class="space-y-3"></div>
				<div id="empty" class="hidden rounded-xl border-2 border-dashed border-gray-200 bg-gray-50 py-12 flex flex-col items-center justify-center text-center">
					<div class="flex bg-white p-3 rounded-full shadow-sm mb-3">
						<span class="material-symbols-outlined text-gray-300 text-3xl">group_off</span>
					</div>
					<p class="text-gray-600 font-medium text-sm">まだ登録がありません</p>
					<p class="text-gray-400 text-xs mt-1">上のフォームから参加団体と担当者を追加してください。</p>
				</div>
			</section>

			<!-- 参照モード（supplier / customer）：IEC担当＋参加団体営業担当 -->
			<div data-visible-for="supplier,customer" class="hidden space-y-8">
				<!-- IEC担当セクション -->
				<section>
					<h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wide px-1 flex items-center gap-2">
						<span class="material-symbols-outlined icon-md text-gray-400">manage_accounts</span>
						IEC担当者
					</h2>
					<div id="iec-cards" class="space-y-3"></div>
				</section>
				<!-- 参加団体営業担当セクション -->
				<section>
					<h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wide px-1 flex items-center gap-2">
						<span class="material-symbols-outlined icon-md text-gray-400">groups</span>
						参加団体営業担当者
					</h2>
					<div id="vendor-sales-cards" class="space-y-3"></div>
					<div id="vendor-sales-empty" class="hidden rounded-xl border-2 border-dashed border-gray-200 bg-gray-50 py-12 flex flex-col items-center justify-center text-center">
						<div class="flex bg-white p-3 rounded-full shadow-sm mb-3">
							<span class="material-symbols-outlined text-gray-300 text-3xl">group_off</span>
						</div>
						<p class="text-gray-600 font-medium text-sm">営業担当者が登録されていません</p>
					</div>
				</section>
			</div>

		</main>

		<div class="fixed bottom-0 inset-x-0 z-50 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
			<div class="mx-auto px-6 py-4 flex items-center justify-end gap-3">
				<button data-visible-for="iec" class="px-5 py-2.5 rounded-lg border border-gray-300 bg-white text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors">
					キャンセル
				</button>
				<button data-visible-for="supplier,customer" class="hidden px-5 py-2.5 rounded-lg border border-gray-300 bg-white text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors">
					閉じる
				</button>
				<button id="save-btn" data-visible-for="iec" class="px-6 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 shadow-sm hover:shadow active:scale-[0.98] transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none disabled:active:scale-100">
					登録する
				</button>
			</div>
		</div>
		</div>

		<!-- IEC編集モード用カードテンプレート -->
		<template id="card-tpl">
			<div class="group relative flex flex-col md:flex-row md:items-center gap-4 rounded-xl bg-white border border-gray-200 shadow-sm px-5 py-4 hover:shadow-md hover:border-blue-200 transition-all duration-200">
				<div class="absolute left-0 top-3 bottom-3 w-1 bg-blue-500 rounded-r opacity-0 group-hover:opacity-100 transition-opacity"></div>

				<div class="flex items-center gap-4 flex-1 min-w-0">
					<div class="shrink-0">
						<span class="avatar inline-grid place-items-center size-10 rounded-full bg-blue-50 text-blue-600 font-bold text-sm border border-blue-100 shadow-sm">A</span>
					</div>
					<div class="min-w-0 flex-1">
						<p class="name text-sm font-bold text-gray-800 truncate group-hover:text-blue-700 transition-colors">氏名</p>
						<p class="org text-xs text-gray-600 truncate mt-0.5 font-medium"></p>
						<p class="email text-xs text-gray-500 truncate font-mono">user@example.com</p>
					</div>
				</div>

				<div class="flex items-center gap-3 mt-3 md:mt-0 w-full md:w-auto justify-between md:justify-end">
					<div class="flex flex-wrap items-center gap-2">
						<label class="cursor-pointer group/chk relative">
							<input type="checkbox" class="peer sr-only role-sales" />
							<span class="block px-3 py-1.5 rounded-md border border-gray-200 bg-white text-xs font-medium text-gray-500 transition-all
										peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 peer-checked:shadow-sm
										group-hover/chk:border-gray-300">
								営業担当
							</span>
						</label>
						<label class="cursor-pointer group/chk relative">
							<input type="checkbox" class="peer sr-only role-apply" />
							<span class="block px-3 py-1.5 rounded-md border border-gray-200 bg-white text-xs font-medium text-gray-500 transition-all
										peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 peer-checked:shadow-sm
										group-hover/chk:border-gray-300">
								申込担当
							</span>
						</label>
						<label class="cursor-pointer group/chk relative">
							<input type="checkbox" class="peer sr-only role-billing" />
							<span class="block px-3 py-1.5 rounded-md border border-gray-200 bg-white text-xs font-medium text-gray-500 transition-all
										peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 peer-checked:shadow-sm
										group-hover/chk:border-gray-300">
								請求担当
							</span>
						</label>
					</div>

					<div class="h-6 w-px bg-gray-200 hidden md:block mx-1"></div>

					<button class="remove flex items-center justify-center size-8 rounded-full text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="削除">
						<span class="material-symbols-outlined icon-md">delete</span>
					</button>
				</div>
			</div>
		</template>

		<!-- Customer参照モード用カードテンプレート（IEC担当） -->
		<template id="iec-card-tpl">
			<div class="flex items-center gap-4 rounded-xl bg-white border border-gray-200 shadow-sm px-5 py-4">
				<div class="shrink-0">
					<span class="avatar inline-grid place-items-center size-10 rounded-full bg-green-50 text-green-600 font-bold text-sm border border-green-100 shadow-sm">A</span>
				</div>
				<div class="min-w-0 flex-1">
					<p class="name text-sm font-bold text-gray-800 truncate">氏名</p>
					<p class="affiliation text-xs text-gray-600 truncate mt-0.5 font-medium">IEC</p>
					<p class="email text-xs text-gray-500 truncate font-mono">user@example.com</p>
				</div>
			</div>
		</template>

		<!-- Customer参照モード用カードテンプレート（参加団体営業担当） -->
		<template id="vendor-card-tpl">
			<div class="flex items-center gap-4 rounded-xl bg-white border border-gray-200 shadow-sm px-5 py-4">
				<div class="shrink-0">
					<span class="avatar inline-grid place-items-center size-10 rounded-full bg-blue-50 text-blue-600 font-bold text-sm border border-blue-100 shadow-sm">A</span>
				</div>
				<div class="min-w-0 flex-1">
					<p class="name text-sm font-bold text-gray-800 truncate">氏名</p>
					<p class="org text-xs text-gray-600 truncate mt-0.5 font-medium"></p>
					<p class="email text-xs text-gray-500 truncate font-mono">user@example.com</p>
				</div>
			</div>
		</template>

		<script>
		// 参加団体登録モーダル v2：ロール別表示切替・排他的営業担当選択・保存バリデーション対応

		window.addEventListener('DOMContentLoaded', () => {
		  // --- マスターデータ ---
		  const orgMaster = [
		    { id: 'org-1', name: '産業能率大学' },
		    { id: 'org-2', name: 'JMAM' },
		    { id: 'org-3', name: 'JTEX' },
		  ];

		  const contactMaster = {
		    'org-1': [
		      { id: 'ichiro', name: '鈴木 一郎', email: 'ichiro.suzuki@sannou.ac.jp' },
		      { id: 'hanako', name: '高橋 花子', email: 'hanako.takahashi@sannou.ac.jp' },
		    ],
		    'org-2': [
		      { id: 'taro', name: '田中 太郎', email: 'taro.tanaka@jmam.co.jp' },
		    ],
		    'org-3': [
		      { id: 'keiko', name: '佐藤 恵子', email: 'keiko.sato@jtex.co.jp' },
		    ],
		  };

		  // 初期登録済みデータ（ロール付き）
		  const initialEntries = [
		    { orgId: 'org-1', contactId: 'ichiro', roles: { sales: true,  apply: false, billing: false } },
		    { orgId: 'org-1', contactId: 'hanako', roles: { sales: false, apply: true,  billing: false } },
		    { orgId: 'org-2', contactId: 'taro',   roles: { sales: true,  apply: true,  billing: true  } },
		    { orgId: 'org-3', contactId: 'keiko',  roles: { sales: true,  apply: true,  billing: true  } },
		  ];

		  // IECユーザーダミーデータ（Customer参照モード用）
		  const iecUsers = [
		    { name: '山田 健一', email: 'yamada.kenichi@iec.co.jp' },
		    { name: '佐々木 裕子', email: 'sasaki.yuko@iec.co.jp' },
		  ];

		  // --- DOM参照 ---
		  const addBtn         = document.getElementById('add-btn');
		  const cardsEl        = document.getElementById('cards');
		  const emptyEl        = document.getElementById('empty');
		  const saveBtn        = document.getElementById('save-btn');
		  const iecCardsEl     = document.getElementById('iec-cards');
		  const vendorCardsEl  = document.getElementById('vendor-sales-cards');
		  const vendorEmptyEl  = document.getElementById('vendor-sales-empty');
		  const cardTpl        = document.getElementById('card-tpl');
		  const iecCardTpl     = document.getElementById('iec-card-tpl');
		  const vendorCardTpl  = document.getElementById('vendor-card-tpl');

		  // --- ユーティリティ ---
		  function orgName(orgId) {
		    return orgMaster.find(o => o.id === orgId)?.name || '';
		  }

		  function findContact(orgId, contactId) {
		    return (contactMaster[orgId] || []).find(c => c.id === contactId);
		  }

		  function setEmptyState() {
		    emptyEl.classList.toggle('hidden', cardsEl.children.length > 0);
		  }

		  // --- 保存バリデーション ---
		  // 条件：担当者0件は保存可。1件以上の場合は
		  //   ① 全担当者が少なくとも1ロール保持
		  //   ② 各団体ごとに営業担当がちょうど1名
		  function validateSaveBtn() {
		    const cards = [...cardsEl.querySelectorAll('[data-contact-id]')];
		    if (cards.length === 0) {
		      saveBtn.disabled = false;
		      return;
		    }

		    const anyNoRole = cards.some(card => {
		      const s = card.querySelector('.role-sales').checked;
		      const a = card.querySelector('.role-apply').checked;
		      const b = card.querySelector('.role-billing').checked;
		      return !s && !a && !b;
		    });

		    const orgSalesCount = {};
		    cards.forEach(card => {
		      const orgId = card.dataset.orgId;
		      if (!(orgId in orgSalesCount)) orgSalesCount[orgId] = 0;
		      if (card.querySelector('.role-sales').checked) orgSalesCount[orgId]++;
		    });
		    const salesInvalid = Object.values(orgSalesCount).some(count => count !== 1);

		    saveBtn.disabled = anyNoRole || salesInvalid;
		  }

		  // --- コンボボックス初期化 ---
		  const orgCombobox = initCombobox(
		    document.getElementById('org-combobox'),
		    {
		      placeholder: '団体を選択してください',
		      items: orgMaster.map(o => ({ value: o.id, label: o.name })),
		      onSelect(orgId) {
		        updateContactCombobox(orgId);
		      },
		    }
		  );

		  const contactCombobox = initCombobox(
		    document.getElementById('contact-combobox'),
		    {
		      placeholder: '担当者を選択してください',
		      disabled: true,
		    }
		  );

		  function updateContactCombobox(orgId) {
		    const contacts = (contactMaster[orgId] || []).map(c => ({ value: c.id, label: c.name }));
		    contactCombobox.setItems(contacts);
		    contactCombobox.setDisabled(!orgId);
		  }

		  // --- カード生成（IEC編集モード） ---
		  function makeCard({ orgId, contactId, roles = {} }) {
		    const contact = findContact(orgId, contactId);
		    const orgLabel = orgName(orgId);
		    if (!contact || !orgLabel) return null;

		    const node = cardTpl.content.firstElementChild.cloneNode(true);
		    node.dataset.orgId     = orgId;
		    node.dataset.contactId = contactId;

		    node.querySelector('.avatar').textContent = contact.name.trim().charAt(0);
		    node.querySelector('.name').textContent   = contact.name;
		    node.querySelector('.org').textContent    = orgLabel;
		    node.querySelector('.email').textContent  = contact.email || '';

		    const salesChk   = node.querySelector('.role-sales');
		    const applyChk   = node.querySelector('.role-apply');
		    const billingChk = node.querySelector('.role-billing');

		    salesChk.checked   = !!roles.sales;
		    applyChk.checked   = !!roles.apply;
		    billingChk.checked = !!roles.billing;

		    // 営業担当：同一団体内で排他的選択
		    salesChk.addEventListener('change', () => {
		      if (salesChk.checked) {
		        cardsEl.querySelectorAll('[data-org-id="' + orgId + '"]').forEach(other => {
		          if (other !== node) other.querySelector('.role-sales').checked = false;
		        });
		      }
		      validateSaveBtn();
		    });

		    applyChk.addEventListener('change', validateSaveBtn);
		    billingChk.addEventListener('change', validateSaveBtn);

		    node.querySelector('.remove').addEventListener('click', () => {
		      node.remove();
		      setEmptyState();
		      validateSaveBtn();
		    });

		    return node;
		  }

		  // 重複チェックしてカードを追加
		  function addEntry(entry) {
		    if (cardsEl.querySelector('[data-contact-id="' + entry.contactId + '"]')) return false;
		    const card = makeCard(entry);
		    if (!card) return false;
		    cardsEl.prepend(card);
		    setEmptyState();
		    validateSaveBtn();
		    return true;
		  }

		  // --- Customer参照モード用カード生成 ---
		  function renderIecCards() {
		    iecCardsEl.innerHTML = '';
		    iecUsers.forEach(user => {
		      const node = iecCardTpl.content.firstElementChild.cloneNode(true);
		      node.querySelector('.avatar').textContent      = user.name.trim().charAt(0);
		      node.querySelector('.name').textContent        = user.name;
		      node.querySelector('.affiliation').textContent = 'IEC';
		      node.querySelector('.email').textContent       = user.email;
		      iecCardsEl.appendChild(node);
		    });
		  }

		  function renderVendorSalesCards() {
		    vendorCardsEl.innerHTML = '';
		    const salesEntries = initialEntries.filter(e => e.roles.sales);
		    if (salesEntries.length === 0) {
		      vendorEmptyEl.classList.remove('hidden');
		      return;
		    }
		    vendorEmptyEl.classList.add('hidden');
		    salesEntries.forEach(entry => {
		      const contact = findContact(entry.orgId, entry.contactId);
		      if (!contact) return;
		      const node = vendorCardTpl.content.firstElementChild.cloneNode(true);
		      node.querySelector('.avatar').textContent = contact.name.trim().charAt(0);
		      node.querySelector('.name').textContent   = contact.name;
		      node.querySelector('.org').textContent    = orgName(entry.orgId);
		      node.querySelector('.email').textContent  = contact.email;
		      vendorCardsEl.appendChild(node);
		    });
		  }

		  // --- 初期化 ---
		  initialEntries.forEach(e => addEntry(e));
		  setEmptyState();
		  validateSaveBtn();
		  renderIecCards();
		  renderVendorSalesCards();

		  // --- イベント ---
		  addBtn.addEventListener('click', () => {
		    const orgId     = orgCombobox.getValue();
		    const contactId = contactCombobox.getValue();

		    if (!orgId || !contactId) {
		      if (!orgId) {
		        const btn = document.querySelector('#org-combobox .combo-btn');
		        btn.classList.add('ring-2', 'ring-red-400');
		        setTimeout(() => btn.classList.remove('ring-2', 'ring-red-400'), 1500);
		      }
		      if (!contactId) {
		        const btn = document.querySelector('#contact-combobox .combo-btn');
		        btn.classList.add('ring-2', 'ring-red-400');
		        setTimeout(() => btn.classList.remove('ring-2', 'ring-red-400'), 1500);
		      }
		      return;
		    }

		    // 新規追加時はロールを全未選択
		    const added = addEntry({ orgId, contactId, roles: {} });
		    if (!added) {
		      // 重複の場合：既存カードをハイライト
		      const existing = cardsEl.querySelector('[data-contact-id="' + contactId + '"]');
		      if (existing) {
		        existing.classList.add('ring-2', 'ring-yellow-400', 'rounded-xl');
		        existing.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
		        setTimeout(() => existing.classList.remove('ring-2', 'ring-yellow-400', 'rounded-xl'), 1500);
		      }
		    }

		    contactCombobox.reset();
		    updateContactCombobox(orgId);
		  });

		  // --- 参加団体の有無セグメントコントロール ---
		  let hasNoVendor = false;

		  function applyVendorMode(noVendor) {
		    hasNoVendor = noVendor;
		    const addForm     = document.getElementById('vendor-add-form');
		    const notice      = document.getElementById('no-vendor-notice');
		    const listSection = document.getElementById('vendor-list-section');

		    addForm.classList.toggle('hidden', noVendor);
		    notice.classList.toggle('hidden', !noVendor);
		    notice.classList.toggle('flex', noVendor);

		    listSection.classList.toggle('opacity-50', noVendor);
		    listSection.classList.toggle('pointer-events-none', noVendor);
		  }

		  document.getElementById('vendor-seg').addEventListener('change', e => {
		    applyVendorMode(e.detail.value === 'no-vendor');
		  });

		  // --- RoleMock初期化 ---
		  if (!new URLSearchParams(location.search).get('role')) {
		    RoleMock.setRoleInUrl('iec');
		  }
		  RoleMock.init({ roleSelect: '#role-select' });
		});
		</script>
	</body>
</html>
