<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>顧客担当登録</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/base-style.css">
    <script src="../js/role-visibility.js"></script>
    <script src="../js/components/combobox.js"></script>

    <style>
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 antialiased">
    <div class="min-h-dvh flex flex-col">

        <header class="sticky top-0 z-10 bg-white/95 backdrop-blur-sm border-b border-gray-100 px-6 py-4">
            <div class="flex items-center justify-between mb-1">
                <div class="flex items-center gap-2">
                    <span class="material-symbols-outlined text-blue-600">person_add</span>
                    <h1 class="text-lg font-bold text-gray-800 tracking-tight">顧客担当登録</h1>
                </div>
                <!-- ロール切替（モックのみ） -->
                <div class="relative">
                    <select id="role-select" class="appearance-none pl-3 pr-8 py-1.5 rounded-md border border-gray-300 bg-gray-50 text-sm text-gray-700 hover:border-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors cursor-pointer">
                        <option value="iec">IEC (管理者)</option>
                        <option value="customer">顧客</option>
                    </select>
                    <span class="material-symbols-outlined absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 text-sm pointer-events-none">expand_more</span>
                </div>
            </div>
            <p class="text-xs text-gray-500 ml-8">本募集における顧客側の担当者情報を管理します。</p>

            <!-- 参照モード案内（Customer のみ）※モックには存在しなかった要素 -->
            <div data-visible-for="customer" class="hidden mt-3 ml-8 flex items-start gap-2 rounded-lg bg-blue-50 border border-blue-100 px-4 py-3">
                <span class="material-symbols-outlined text-blue-500 shrink-0 mt-0.5" style="font-size: 18px;">info</span>
                <p class="text-sm text-blue-700">この画面は閲覧専用です。担当者の追加・削除・変更は行えません。</p>
            </div>
        </header>

        <main class="flex-1 px-6 py-6 space-y-8 pb-32">

            <!-- 新規追加フォーム（IEC のみ） -->
            <section data-visible-for="iec" class="bg-white rounded-xl shadow-sm border border-gray-200">
                <div class="bg-gray-50/50 px-5 py-3 border-b border-gray-100 flex items-center justify-between rounded-t-xl">
                    <h2 class="text-sm font-bold text-gray-700 flex items-center gap-2">
                        <span class="material-symbols-outlined icon-md text-gray-400">add_circle</span>
                        新規追加
                    </h2>
                </div>
                <div class="p-5">
                    <div class="flex flex-col sm:flex-row gap-4 items-end">
                        <div class="flex flex-col gap-1.5 flex-1 min-w-[200px] max-w-md">
                            <label class="text-sm font-bold text-gray-700 uppercase tracking-wide">担当者</label>
                            <div id="contact-combobox"></div>
                        </div>
                        <button id="btn-add" class="h-10 w-full sm:w-auto shrink-0 rounded-lg bg-blue-600 px-5 text-white text-sm font-bold hover:bg-blue-700 hover:shadow active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                            <span class="material-symbols-outlined icon-sm">add</span>
                            追加する
                        </button>
                    </div>
                    <p id="add-error" class="hidden mt-2 text-xs text-red-500 flex items-center gap-1">
                        <span class="material-symbols-outlined" style="font-size: 14px;">error</span>
                        担当者を選択してください。
                    </p>
                    <p class="mt-2 text-xs text-gray-400 flex items-center gap-1">
                        <span class="material-symbols-outlined icon-sm" style="font-size: 14px !important;">info</span>
                        同じ担当者は重複して登録できません。
                    </p>
                </div>
            </section>

            <!-- 登録済み担当者一覧 -->
            <section>
                <h2 class="text-sm font-bold text-gray-500 mb-3 uppercase tracking-wide px-1 flex items-center gap-2">
                    登録済み担当者
                </h2>
                <div id="cards" class="space-y-3"></div>
                <div id="empty" class="hidden rounded-xl border-2 border-dashed border-gray-200 bg-gray-50 py-12 flex flex-col items-center justify-center text-center">
                    <div class="flex bg-white p-3 rounded-full shadow-sm mb-3">
                        <span class="material-symbols-outlined text-gray-300 text-3xl">group_off</span>
                    </div>
                    <p class="text-gray-600 font-medium text-sm">登録された担当者はいません</p>
                    <p class="text-gray-400 text-xs mt-1">上のフォームから担当者を追加してください。</p>
                </div>
            </section>
        </main>

        <!-- フッター -->
        <div class="fixed bottom-0 inset-x-0 z-50 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
            <div class="mx-auto px-6 py-4 flex items-center justify-end gap-3">
                <!-- IEC のみ -->
                <button data-visible-for="iec"
                        class="px-5 py-2.5 rounded-lg border border-gray-300 bg-white text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors">
                    キャンセル
                </button>
                <button data-visible-for="iec" id="btn-save"
                        class="px-6 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 shadow-sm hover:shadow active:scale-[0.98] transition-all disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:shadow-none disabled:active:scale-100">
                    登録する
                </button>
                <!-- Customer のみ ※モックには存在しなかった要素 -->
                <button data-visible-for="customer"
                        class="hidden px-6 py-2.5 rounded-lg border border-gray-300 bg-white text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors">
                    閉じる
                </button>
            </div>
        </div>
    </div>

    <script>
        // ─── デモデータ ───────────────────────────────────────────
        const users = [
            { id: 1, name: '山田 太郎',  email: 'yamada@customer.co.jp',  isAdmin: true  },
            { id: 2, name: '鈴木 花子',  email: 'suzuki@customer.co.jp',  isAdmin: false },
        ];

        const candidatePool = {
            3: { id: 3, name: '中村 健一', email: 'nakamura@customer.co.jp' },
            4: { id: 4, name: '佐藤 美咲', email: 'sato@customer.co.jp'     },
            5: { id: 5, name: '田中 浩二', email: 'tanaka@customer.co.jp'   },
        };

        // ─── カード生成 ──────────────────────────────────────────
        function createCard(user) {
            const card = document.createElement('div');
            card.className = 'group relative flex flex-col sm:flex-row sm:items-center gap-4 rounded-xl bg-white border border-gray-200 shadow-sm px-5 py-4 hover:shadow-md hover:border-blue-200 transition-all duration-200';
            card.dataset.userId = user.id;

            // IEC:
            //   管理者: 青塗りの「管理者」バッジ（現在の状態を示す表示）
            //   非管理者: 未選択ラジオ「管理者設定する」（クリックで管理者に昇格）
            // Customer: 管理者バッジ（青）または 担当者バッジ（グレー）の静的表示
            const roleBadgesHtml = `
                ${user.isAdmin ? `
                <span data-visible-for="iec" class="block px-3 py-1.5 rounded-md border border-blue-600 bg-blue-600 text-white text-xs font-bold">
                    管理者
                </span>` : `
                <label data-visible-for="iec" class="cursor-pointer group/chk relative">
                    <input type="radio" name="admin-select" value="${user.id}" class="peer sr-only">
                    <span class="block px-3 py-1.5 rounded-md border border-dashed border-gray-300 bg-white text-xs font-medium text-gray-400 transition-all
                               hover:border-blue-400 hover:text-blue-600 hover:bg-blue-50">
                        管理者設定する
                    </span>
                </label>`}
                ${user.isAdmin ? `
                <span data-visible-for="customer" class="hidden block px-3 py-1.5 rounded-md border border-blue-200 bg-blue-50 text-xs font-medium text-blue-700">
                    管理者
                </span>` : `
                <span data-visible-for="customer" class="hidden block px-3 py-1.5 rounded-md border border-gray-200 bg-white text-xs font-medium text-gray-500">
                    担当者
                </span>`}
            `;

            card.innerHTML = `
                <div class="absolute left-0 top-3 bottom-3 w-1 bg-blue-500 rounded-r opacity-0 group-hover:opacity-100 transition-opacity"></div>

                <div class="flex items-center gap-4 flex-1 min-w-0">
                    <div class="shrink-0">
                        <span class="inline-grid place-items-center size-10 rounded-full bg-blue-50 text-blue-600 font-bold text-sm border border-blue-100 shadow-sm">
                            ${user.name.charAt(0)}
                        </span>
                    </div>
                    <div class="min-w-0 flex-1">
                        <p class="text-sm font-bold text-gray-800 truncate group-hover:text-blue-700 transition-colors">${user.name}</p>
                        <p class="text-xs text-gray-500 truncate font-mono mt-0.5">${user.email}</p>
                    </div>
                </div>

                <div class="flex items-center gap-3 mt-3 sm:mt-0 w-full sm:w-auto justify-between sm:justify-end">
                    <div class="flex items-center gap-2">
                        ${roleBadgesHtml}
                    </div>
                    <div class="h-6 w-px bg-gray-200 hidden sm:block mx-1" data-visible-for="iec"></div>
                    <button data-visible-for="iec" class="btn-remove flex items-center justify-center size-8 rounded-full text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors" title="削除">
                        <span class="material-symbols-outlined icon-md">delete</span>
                    </button>
                </div>
            `;
            return card;
        }

        // ─── カード描画 ──────────────────────────────────────────
        function renderCards() {
            const container = document.getElementById('cards');
            const empty     = document.getElementById('empty');
            container.innerHTML = '';

            if (users.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                users.forEach(u => container.appendChild(createCard(u)));
            }

            // 動的に追加した DOM にもロール表示を適用
            RoleMock.applyRoleVisibility();
            updateSaveButton();
        }

        // ─── 保存ボタン活性制御 ──────────────────────────────────
        function updateSaveButton() {
            const adminCount = users.filter(u => u.isAdmin).length;
            const btn = document.getElementById('btn-save');
            if (btn) btn.disabled = (adminCount !== 1);
        }

        // ─── コンボボックス初期化 ──────────────────────────────────
        const contactCombobox = initCombobox(
            document.getElementById('contact-combobox'),
            {
                placeholder: 'リストから選択してください',
                items: [
                    { value: '3', label: '中村 健一 (nakamura@customer.co.jp)' },
                    { value: '4', label: '佐藤 美咲 (sato@customer.co.jp)'     },
                    { value: '5', label: '田中 浩二 (tanaka@customer.co.jp)'   },
                ],
            }
        );

        // ─── 追加ボタン ──────────────────────────────────────────
        document.getElementById('btn-add').addEventListener('click', () => {
            const errEl    = document.getElementById('add-error');
            const rawValue = contactCombobox.getValue();
            const selValue = parseInt(rawValue);
            const comboBtn = document.querySelector('#contact-combobox .combo-btn');

            if (!rawValue) {
                comboBtn.classList.add('ring-2', 'ring-red-400', 'border-red-400');
                errEl.classList.remove('hidden');
                return;
            }
            comboBtn.classList.remove('ring-2', 'ring-red-400', 'border-red-400');
            errEl.classList.add('hidden');

            if (users.find(u => u.id === selValue)) return; // 重複禁止

            const candidate = candidatePool[selValue];
            if (!candidate) return;

            users.unshift({ ...candidate, isAdmin: false });
            renderCards();
            contactCombobox.reset();
        });

        // ─── ラジオ変更：管理者切替 ──────────────────────────────
        document.getElementById('cards').addEventListener('change', e => {
            if (e.target.name === 'admin-select') {
                const selectedId = parseInt(e.target.value);
                users.forEach(u => u.isAdmin = (u.id === selectedId));
                renderCards();
            }
        });

        // ─── 削除ボタン ──────────────────────────────────────────
        document.getElementById('cards').addEventListener('click', e => {
            const btn = e.target.closest('.btn-remove');
            if (!btn) return;
            const card   = btn.closest('[data-user-id]');
            const userId = parseInt(card.dataset.userId);
            const idx    = users.findIndex(u => u.id === userId);
            if (idx !== -1) users.splice(idx, 1);
            renderCards();
        });

        // ─── 初期化 ──────────────────────────────────────────────
        // ロールが未設定の場合は iec をデフォルトにする
        if (!new URLSearchParams(location.search).get('role')) {
            RoleMock.setRoleInUrl('iec');
        }

        // ナビなしで初期化（モーダルにはサイドナビなし）
        RoleMock.init({ roleSelect: '#role-select' });

        // ロール変更時にカードを再描画（data-visible-for 適用のため）
        document.getElementById('role-select').addEventListener('change', () => {
            renderCards();
        });

        renderCards();
    </script>
</body>
</html>
