<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <title>申込期間登録 v2（仕様書完全対応版）</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/base-style.css">

    <style>
        body { font-family: 'Noto Sans JP', sans-serif; }
        .accordion-content { transition: max-height 0.3s ease-out; overflow: hidden; }
        .period-card.active { border-color: #3b82f6; --tw-ring-color: #3b82f6; }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        /* 非活性状態 */
        .field-disabled { opacity: 0.4; pointer-events: none; }
        /* フェーズバッジアニメ */
        @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
        .animate-fadein { animation: fadeIn 0.15s ease-out; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased pb-32">

    <!-- ▼ モック専用：デモコントロールパネル（実装時は削除） -->
    <div class="sticky top-0 z-50 bg-amber-50 border-b-2 border-amber-300 px-4 py-2 flex flex-wrap items-center gap-3 text-xs">
        <span class="font-bold text-amber-700 flex items-center gap-1">
            <span class="material-symbols-outlined text-sm">construction</span>
            デモ用コントロール（実装時削除）
        </span>
        <div class="flex items-center gap-2">
            <span class="text-amber-600 font-bold">サイトフェーズ：</span>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="radio" name="demo-phase" value="before" checked class="accent-amber-500"> 公開前
            </label>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="radio" name="demo-phase" value="open" class="accent-green-500"> 公開中
            </label>
            <label class="flex items-center gap-1 cursor-pointer">
                <input type="radio" name="demo-phase" value="after" class="accent-slate-500"> 公開終了後
            </label>
        </div>
        <div class="text-amber-600">
            基準日（今日）: <span id="demo-today" class="font-mono font-bold"></span>
        </div>
        <button id="btn-load-demo" class="px-2 py-1 bg-amber-400 text-amber-900 rounded font-bold hover:bg-amber-500 transition">
            サンプルデータをロード
        </button>
    </div>

    <!-- ▼ ヘッダー -->
    <header class="sticky top-[44px] z-40 bg-white/95 backdrop-blur-sm border-b border-gray-100 px-6 py-4">
        <div class="flex items-center gap-2 mb-1">
            <span class="material-symbols-outlined text-blue-600">calendar_add_on</span>
            <h1 class="text-lg font-bold text-gray-800 tracking-tight">申込期間・開講日設定</h1>
        </div>
        <p class="text-xs text-gray-500 ml-8">申込期間と、それに紐づく開講日、申込締切日を一元管理します</p>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 space-y-8">

        <!-- ▼ エリアB：新規申込期間を登録 -->
        <section id="new-period-section" class="bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="bg-gray-50/50 px-5 py-3 border-b border-gray-100 flex items-center justify-between">
                <h2 class="text-sm font-bold text-gray-700 flex items-center gap-2">
                    <span class="material-symbols-outlined icon-md text-gray-400">add_circle</span>
                    新規申込期間を登録
                </h2>
                <!-- 申込期間を持たないチェックボックス -->
                <label id="no-period-label" class="flex items-center gap-2 cursor-pointer select-none group">
                    <div class="relative">
                        <input type="checkbox" id="chk-no-period" class="sr-only peer">
                        <div class="w-9 h-5 bg-slate-200 peer-checked:bg-blue-600 rounded-full transition-colors"></div>
                        <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform peer-checked:translate-x-4"></div>
                    </div>
                    <span class="text-xs font-bold text-slate-600 group-hover:text-slate-800 transition-colors">申込期間を持たない</span>
                </label>
            </div>

            <!-- エラーメッセージ表示エリア -->
            <div id="form-error" class="hidden mx-4 mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-xs text-red-600 font-medium flex items-start gap-2">
                <span class="material-symbols-outlined text-sm text-red-500 mt-0.5">error</span>
                <span id="form-error-text"></span>
            </div>

            <div class="p-4 sm:p-6">
                <div id="new-period-fields" class="grid grid-cols-1 md:grid-cols-[1fr_auto_auto_auto] gap-4 items-end transition-all">
                    <div class="flex flex-col space-y-1.5">
                        <label class="text-sm font-bold text-slate-600 ml-1">
                            期間名称
                            <span class="text-red-400 ml-0.5">*</span>
                        </label>
                        <input id="new-period-name" type="text"
                            class="w-full h-10 rounded-lg border border-gray-300 bg-slate-50 px-4 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all"
                            placeholder="例：2026年度 春期募集">
                    </div>
                    <div class="flex flex-col space-y-1.5">
                        <label class="text-sm font-bold text-slate-600 ml-1">
                            受付開始
                            <span class="text-red-400 ml-0.5">*</span>
                        </label>
                        <input id="new-period-from" type="date"
                            class="h-10 rounded-lg border border-gray-300 bg-slate-50 px-4 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                    </div>
                    <div class="flex flex-col space-y-1.5">
                        <label class="text-sm font-bold text-slate-600 ml-1">
                            受付終了
                            <span class="text-red-400 ml-0.5">*</span>
                        </label>
                        <input id="new-period-to" type="date"
                            class="h-10 rounded-lg border border-gray-300 bg-slate-50 px-4 text-sm focus:ring-2 focus:ring-blue-500 focus:bg-white outline-none transition-all">
                    </div>
                    <button id="btn-add-period"
                        class="h-10 px-6 bg-blue-600 text-white rounded-lg font-bold text-sm hover:bg-blue-700 transition-colors shadow-lg shadow-slate-200 flex items-center gap-2">
                        <span class="material-symbols-outlined text-sm">add</span>
                        期間を作成
                    </button>
                </div>
                <!-- 申込期間を持たない時のインジケーター -->
                <div id="no-period-indicator" class="hidden mt-4 p-4 bg-blue-50 border border-blue-200 rounded-xl flex items-center gap-3">
                    <span class="material-symbols-outlined text-blue-500">info</span>
                    <div>
                        <p class="text-sm font-bold text-blue-700">「申込期間を持たない」が設定されています</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- ▼ エリアC：登録済みの期間一覧 -->
        <div class="space-y-4">
            <div class="flex items-center justify-between px-2">
                <h3 class="text-sm font-bold text-slate-500 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">list_alt</span>
                    登録済みの期間一覧
                </h3>
                <span id="period-count-badge" class="text-xs px-2 py-0.5 bg-slate-200 text-slate-600 rounded-full font-bold">0件</span>
            </div>

            <div id="master-container" class="space-y-4">
                <!-- 空状態 -->
                <div id="empty-state" class="py-20 text-center bg-white border-2 border-dashed border-slate-200 rounded-3xl">
                    <span class="material-symbols-outlined text-5xl text-slate-200 mb-4">folder_off</span>
                    <p class="text-slate-400 font-medium">期間が登録されていません。上のフォームから作成してください。</p>
                </div>
            </div>
        </div>
    </main>

    <!-- ▼ フッター -->
    <div class="fixed bottom-0 inset-x-0 z-50 bg-white border-t border-gray-200 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="mx-auto px-6 py-4 flex items-center justify-end gap-3">
            <button id="btn-cancel"
                class="px-5 py-2.5 rounded-lg border border-gray-300 bg-white text-sm font-bold text-gray-600 hover:bg-gray-50 hover:text-gray-800 transition-colors">
                キャンセル
            </button>
            <button id="btn-submit"
                class="px-6 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-bold hover:bg-blue-700 shadow-sm hover:shadow active:scale-[0.98] transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-sm">save</span>
                登録する
            </button>
        </div>
    </div>

<script>
// ===== 状態管理 =====
let periods = [];
let activeAccordionId = null;
// サイトフェーズ（実装時は基幹DBのf_media_planから算出）
// before:公開前 / open:公開中 / after:公開終了後
let sitePhase = 'before';
// 今日の日付（YYYY-MM-DD）
const TODAY = new Date().toISOString().slice(0, 10);

// ===== DOM参照 =====
const masterContainer    = document.getElementById('master-container');
const emptyState         = document.getElementById('empty-state');
const btnAddPeriod       = document.getElementById('btn-add-period');
const periodCountBadge   = document.getElementById('period-count-badge');
const chkNoPeriod        = document.getElementById('chk-no-period');
const newPeriodFields    = document.getElementById('new-period-fields');
const noPeriodIndicator  = document.getElementById('no-period-indicator');
const formError          = document.getElementById('form-error');
const formErrorText      = document.getElementById('form-error-text');

// ===== ユーティリティ =====
function fmt(dateStr) {
    return dateStr ? dateStr.replace(/-/g, '/') : '—';
}
function addDays(dateStr, n) {
    const d = new Date(dateStr);
    d.setDate(d.getDate() + n);
    return d.toISOString().slice(0, 10);
}
function showError(msg) {
    formErrorText.textContent = msg;
    formError.classList.remove('hidden');
    setTimeout(() => formError.classList.add('hidden'), 4000);
}

// ===== フェーズ判定 =====
// 受付期間のフェーズ（未来/進行中/過去）
function getPeriodPhase(period) {
    if (TODAY < period.from) return 'future';        // 未来（受付開始前）
    if (TODAY <= period.to)   return 'active';       // 進行中
    return 'past';                                   // 過去
}
// 開講日（セッション）のフェーズ（未来/過去）※締切日で判定
function getSessionPhase(session) {
    return TODAY <= session.limit ? 'future' : 'past';
}

// ===== 操作制御 =====
// 受付期間 追加が可能か（サイトレベル判定）
function canAddPeriod()   { return sitePhase !== 'after'; }
// 開講日 追加が可能か（サイトレベル判定）
function canAddSession()  { return sitePhase !== 'after'; }
// 受付期間 名称編集（未来 or 進行中、かつ公開終了後でない）
function canEditPeriodName(period) {
    const ph = getPeriodPhase(period);
    return sitePhase !== 'after' && (ph === 'future' || ph === 'active');
}
// 受付期間 日程編集（未来のみ、かつ公開終了後でない）
function canEditPeriodDate(period) {
    return sitePhase !== 'after' && getPeriodPhase(period) === 'future';
}
// 受付期間 削除（未来のみ、かつ公開前のみ）
function canDeletePeriod(period) {
    return sitePhase === 'before' && getPeriodPhase(period) === 'future';
}
// 「申込期間を持たない」切り替え（公開前のみ）
function canToggleNoPeriod() { return sitePhase === 'before'; }
// 開講日 編集（未来のみ）
function canEditSession(session) {
    return sitePhase !== 'after' && getSessionPhase(session) === 'future';
}
// 申込締切日の延長（未来 or 締切前:future）
function canExtendDeadline(session) {
    return sitePhase !== 'after' && getSessionPhase(session) === 'future';
}
// 開講日+締切日ペア 削除（未来のみ）
function canDeleteSession(session) {
    return sitePhase !== 'after' && getSessionPhase(session) === 'future';
}

// ===== フェーズバッジHTML =====
function phaseBadge(phase) {
    const map = {
        future: ['未来',    'bg-sky-100 text-sky-700 border-sky-200'],
        active: ['進行中',  'bg-green-100 text-green-700 border-green-200'],
        past:   ['過去',    'bg-slate-100 text-slate-500 border-slate-200'],
    };
    const [label, cls] = map[phase] || ['—', ''];
    return `<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border ${cls}">${label}</span>`;
}

// ===== エラーメッセージ定義（仕様書 4-2-5 準拠） =====
const ERR = {
    periodDateActive:  '受付中のため、受付期間の日程は変更できません',
    periodDeleteActive:'受付中または受付終了済みのため、この受付期間は削除できません',
    noPeriodOpen:      '募集サイト公開中のため、この設定は変更できません',
    sessionEditActive: '受付開始後のため、開講日は変更できません',
    deadlinePast:      '申込締切日を過ぎているため、変更できません',
    deadlineAdvance:   '申込締切日を前倒しすることはできません',
    sessionDeleteActive: '受付開始後のため、この開講日は削除できません',
    siteAfter:         '募集サイト公開終了後のため、変更できません',
};

// ===== 「申込期間を持たない」チェックボックス制御 =====
chkNoPeriod.addEventListener('change', () => {
    if (chkNoPeriod.checked && !canToggleNoPeriod()) {
        showError(ERR.noPeriodOpen);
        chkNoPeriod.checked = false;
        return;
    }
    applyNoPeriodState();
});

function applyNoPeriodState() {
    const isNoPeriod = chkNoPeriod.checked;
    // フォームフィールドの活性/非活性
    newPeriodFields.classList.toggle('field-disabled', isNoPeriod);
    noPeriodIndicator.classList.toggle('hidden', !isNoPeriod);
    // 一覧の操作制限はrender()内で制御
    render();
}

// ===== 受付開始日変更時：翌日を受付終了に自動セット =====
document.getElementById('new-period-from').addEventListener('change', (e) => {
    if (e.target.value) {
        const toInput = document.getElementById('new-period-to');
        if (!toInput.value) {
            toInput.value = addDays(e.target.value, 1);
        }
    }
});

// ===== 申込期間の追加 =====
btnAddPeriod.addEventListener('click', () => {
    if (!canAddPeriod()) { showError(ERR.siteAfter); return; }

    const nameInput = document.getElementById('new-period-name');
    const fromInput = document.getElementById('new-period-from');
    const toInput   = document.getElementById('new-period-to');

    if (!nameInput.value.trim()) { showError('期間名称を入力してください'); return; }
    if (!fromInput.value)        { showError('受付開始日を入力してください'); return; }
    if (!toInput.value)          { showError('受付終了日を入力してください'); return; }
    if (fromInput.value > toInput.value) { showError('受付終了日は受付開始日以降の日付を入力してください'); return; }

    const newPeriod = {
        id: Date.now(),
        name: nameInput.value.trim(),
        from: fromInput.value,
        to:   toInput.value,
        isEditing: false,
        sessions: [],
        _editSnapshot: null,
    };
    periods.push(newPeriod);
    activeAccordionId = newPeriod.id;

    nameInput.value = '';
    fromInput.value = '';
    toInput.value   = '';
    render();
});

// ===== レンダリング =====
function render() {
    const isNoPeriod = chkNoPeriod.checked;
    masterContainer.innerHTML = '';

    if (periods.length === 0) {
        masterContainer.appendChild(emptyState);
        emptyState.classList.remove('hidden');
        periodCountBadge.textContent = '0件';
        return;
    }
    emptyState.classList.add('hidden');
    periodCountBadge.textContent = `${periods.length}件`;
    periods.forEach(p => masterContainer.appendChild(createPeriodCard(p, isNoPeriod)));
}

// ===== 申込期間カードの生成 =====
function createPeriodCard(period, isNoPeriod) {
    const isOpen  = activeAccordionId === period.id;
    const phase   = getPeriodPhase(period);

    const div = document.createElement('div');
    div.className = `period-card bg-white border ${isOpen ? 'border-blue-500 ring-1 ring-blue-500' : 'border-slate-200'} rounded-2xl overflow-hidden shadow-sm transition-all mb-4 animate-fadein`;

    // ヘッダー（通常 or 編集）
    let headerHtml = '';
    if (period.isEditing) {
        headerHtml = `
            <div class="p-4 flex flex-wrap items-end gap-3 bg-blue-50/50">
                <div class="flex-1 min-w-[200px] space-y-1">
                    <label class="text-xs font-bold text-blue-600 ml-1">期間名称</label>
                    <input type="text" id="edit-p-name-${period.id}" value="${escHtml(period.name)}"
                        class="w-full h-9 rounded-lg border border-blue-300 px-3 text-sm outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="flex flex-col space-y-1 ${canEditPeriodDate(period) ? '' : 'field-disabled'}" title="${canEditPeriodDate(period) ? '' : ERR.periodDateActive}">
                    <label class="text-xs font-bold text-blue-600 ml-1">開始</label>
                    <input type="date" id="edit-p-from-${period.id}" value="${period.from}"
                        class="h-9 rounded-lg border border-blue-300 px-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                        ${canEditPeriodDate(period) ? '' : 'disabled'}>
                </div>
                <div class="flex flex-col space-y-1 ${canEditPeriodDate(period) ? '' : 'field-disabled'}" title="${canEditPeriodDate(period) ? '' : ERR.periodDateActive}">
                    <label class="text-xs font-bold text-blue-600 ml-1">終了</label>
                    <input type="date" id="edit-p-to-${period.id}" value="${period.to}"
                        class="h-9 rounded-lg border border-blue-300 px-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"
                        ${canEditPeriodDate(period) ? '' : 'disabled'}>
                </div>
                <div class="flex gap-1">
                    <button onclick="savePeriodEdit(${period.id})"
                        class="h-9 px-3 bg-blue-600 text-white rounded-lg text-xs font-bold hover:bg-blue-700">保存</button>
                    <button onclick="cancelPeriodEdit(${period.id})"
                        class="h-9 px-3 bg-white border border-slate-200 text-slate-500 rounded-lg text-xs font-bold hover:bg-slate-50">戻る</button>
                </div>
            </div>
        `;
    } else {
        const editBtnDisabled = isNoPeriod || !canEditPeriodName(period);
        const editBtnTitle    = sitePhase === 'after' ? ERR.siteAfter : (phase === 'past' ? '受付終了済みのため編集できません' : '');
        headerHtml = `
            <div class="p-4 flex items-center gap-4 cursor-pointer hover:bg-slate-50/50 group" onclick="toggleAccordion(${period.id})">
                <div class="size-10 rounded-xl ${isOpen ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600'} flex items-center justify-center font-bold text-sm border border-blue-100 transition-all shrink-0">
                    ${escHtml(period.name.charAt(0))}
                </div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2">
                        <h4 class="font-bold text-slate-800 truncate">${escHtml(period.name)}</h4>
                        ${phaseBadge(phase)}
                    </div>
                    <p class="text-[11px] font-mono text-slate-400 flex items-center gap-1 mt-0.5">
                        <span class="material-symbols-outlined text-[12px]">calendar_today</span>
                        ${fmt(period.from)} — ${fmt(period.to)}
                    </p>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="startPeriodEdit(${period.id})"
                        class="p-2 rounded-lg transition-all ${editBtnDisabled ? 'text-slate-200 cursor-not-allowed' : 'opacity-0 group-hover:opacity-100 text-slate-400 hover:text-blue-600 hover:bg-blue-50'}"
                        title="${editBtnTitle}" ${editBtnDisabled ? 'disabled' : ''}>
                        <span class="material-symbols-outlined text-sm">edit_note</span>
                    </button>
                    <span class="material-symbols-outlined text-slate-300 transition-transform ${isOpen ? 'rotate-180' : ''}">expand_more</span>
                </div>
            </div>
        `;
    }

    // アコーディオン内コンテンツ
    const addSessionDisabled = isNoPeriod || !canAddSession();
    const deletePeriodDisabled = isNoPeriod || !canDeletePeriod(period);
    const deletePeriodTitle = !canDeletePeriod(period)
        ? (phase === 'active' || phase === 'past' ? ERR.periodDeleteActive : (sitePhase === 'after' ? ERR.siteAfter : sitePhase === 'open' ? '公開中は削除できません' : ''))
        : '';

    const accordionHtml = `
        <div class="${isOpen ? '' : 'hidden'} border-t border-slate-100 bg-slate-50/30 p-4 sm:p-6 space-y-6 relative">
            <div class="absolute left-[27px] top-0 bottom-0 w-px border-l-2 border-dashed border-slate-200"></div>

            <!-- 新規日程追加フォーム -->
            <div class="relative z-10 ml-10 ${addSessionDisabled ? 'opacity-50' : ''} bg-white p-4 rounded-xl border border-slate-200 shadow-sm space-y-3">
                <p class="text-[10px] font-bold text-blue-600 uppercase flex items-center gap-1">
                    <span class="material-symbols-outlined text-[14px]">add_circle</span>新規日程を追加
                </p>
                <div class="grid grid-cols-1 sm:grid-cols-[1fr_1fr_auto] gap-3 items-end">
                    <div class="flex flex-col space-y-1.5">
                        <label class="text-xs font-bold text-slate-600 ml-1">開講日 <span class="text-red-400">*</span></label>
                        <input type="date" id="open-${period.id}"
                            class="h-9 rounded-lg border border-slate-200 px-3 text-xs outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                            ${addSessionDisabled ? 'disabled' : ''}>
                    </div>
                    <div class="flex flex-col space-y-1.5">
                        <label class="text-xs font-bold text-slate-600 ml-1">申込締切 <span class="text-red-400">*</span></label>
                        <input type="date" id="limit-${period.id}"
                            class="h-9 rounded-lg border border-slate-200 px-3 text-xs outline-none focus:ring-2 focus:ring-blue-500 transition-all"
                            ${addSessionDisabled ? 'disabled' : ''}>
                    </div>
                    <button onclick="addSession(${period.id})"
                        class="h-9 px-4 rounded-lg text-xs font-bold transition-colors ${addSessionDisabled ? 'bg-slate-100 text-slate-300 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700'}"
                        ${addSessionDisabled ? 'disabled' : ''}>追加</button>
                </div>
                ${addSessionDisabled && sitePhase === 'after' ? `<p class="text-[11px] text-red-400 flex items-center gap-1"><span class="material-symbols-outlined text-sm">lock</span>${ERR.siteAfter}</p>` : ''}
            </div>

            <!-- 開講日リスト -->
            <div class="relative z-10 ml-10 space-y-2" id="sessions-${period.id}">
                ${renderSessions(period, isNoPeriod)}
            </div>

            <!-- 削除ボタン -->
            <div class="pt-4 flex justify-end border-t border-slate-100 relative z-10">
                <button onclick="deletePeriod(${period.id})"
                    class="flex items-center gap-1 px-3 py-1.5 text-xs font-bold rounded-lg transition-colors ${deletePeriodDisabled ? 'text-slate-300 cursor-not-allowed' : 'text-red-400 hover:text-red-600 hover:bg-red-50'}"
                    ${deletePeriodDisabled ? 'disabled' : ''}
                    title="${deletePeriodTitle}">
                    <span class="material-symbols-outlined text-sm">delete</span>
                    この申込期間を削除
                </button>
            </div>
        </div>
    `;

    div.innerHTML = headerHtml + accordionHtml;
    return div;
}

// ===== 開講日のレンダリング =====
function renderSessions(period, isNoPeriod) {
    if (period.sessions.length === 0) {
        return `<p class="text-[11px] text-slate-400 italic py-2">開講日が登録されていません。</p>`;
    }
    return period.sessions.map(s => {
        const sPhase = getSessionPhase(s);
        const editOk   = !isNoPeriod && canEditSession(s);
        const deleteOk = !isNoPeriod && canDeleteSession(s);

        if (s.isEditing) {
            return `
                <div class="flex items-center gap-3 bg-blue-50 border border-blue-200 p-3 rounded-xl animate-fadein">
                    <div class="grid grid-cols-2 gap-3 flex-1">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1">開講日</label>
                            <input type="date" id="edit-open-${s.id}" value="${s.open}"
                                class="w-full h-8 rounded border border-blue-300 px-2 text-xs mt-1"
                                ${editOk ? '' : 'disabled'}>
                            ${!editOk ? `<p class="text-[10px] text-red-400 mt-0.5">${ERR.sessionEditActive}</p>` : ''}
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1">申込締切</label>
                            <input type="date" id="edit-limit-${s.id}" value="${s.limit}"
                                class="w-full h-8 rounded border border-blue-300 px-2 text-xs mt-1">
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="saveSessionEdit(${period.id}, ${s.id})"
                            class="size-8 flex items-center justify-center bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-sm">
                            <span class="material-symbols-outlined text-sm">check</span>
                        </button>
                        <button onclick="cancelSessionEdit(${period.id}, ${s.id})"
                            class="size-8 flex items-center justify-center bg-white text-slate-400 rounded-lg border border-slate-200">
                            <span class="material-symbols-outlined text-sm">close</span>
                        </button>
                    </div>
                </div>
            `;
        }
        return `
            <div class="group flex items-center justify-between bg-white border border-slate-200 p-3 rounded-xl hover:shadow-md hover:border-blue-200 transition-all">
                <div class="flex items-center gap-6">
                    ${phaseBadge(sPhase)}
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">開講日</span>
                        <span class="text-xs font-bold font-mono text-slate-700">${fmt(s.open)}</span>
                    </div>
                    <div class="flex flex-col border-l border-slate-100 pl-6">
                        <span class="text-[10px] font-bold text-red-400 uppercase">申込締切</span>
                        <span class="text-xs font-bold font-mono text-slate-500">${fmt(s.limit)}</span>
                    </div>
                </div>
                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                    <button onclick="startSessionEdit(${period.id}, ${s.id})"
                        class="size-8 flex items-center justify-center rounded-full transition-colors ${editOk ? 'text-slate-400 hover:text-blue-600 hover:bg-blue-50' : 'text-slate-200 cursor-not-allowed'}"
                        title="${editOk ? '編集' : ERR.sessionEditActive}" ${editOk ? '' : 'disabled'}>
                        <span class="material-symbols-outlined text-lg">edit</span>
                    </button>
                    <button onclick="deleteSession(${period.id}, ${s.id})"
                        class="size-8 flex items-center justify-center rounded-full transition-colors ${deleteOk ? 'text-slate-400 hover:text-red-500 hover:bg-red-50' : 'text-slate-200 cursor-not-allowed'}"
                        title="${deleteOk ? '削除' : ERR.sessionDeleteActive}" ${deleteOk ? '' : 'disabled'}>
                        <span class="material-symbols-outlined text-lg">delete</span>
                    </button>
                </div>
            </div>
        `;
    }).join('');
}

// ===== アクション関数群 =====
function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.toggleAccordion = (id) => {
    activeAccordionId = (activeAccordionId === id) ? null : id;
    render();
};

// 申込期間 編集
window.startPeriodEdit = (id) => {
    event.stopPropagation();
    if (sitePhase === 'after') { showError(ERR.siteAfter); return; }
    const period = periods.find(p => p.id === id);
    if (!canEditPeriodName(period)) { showError(ERR.periodDateActive); return; }
    period._editSnapshot = { name: period.name, from: period.from, to: period.to };
    period.isEditing = true;
    activeAccordionId = id;
    render();
};
window.cancelPeriodEdit = (id) => {
    const period = periods.find(p => p.id === id);
    if (period._editSnapshot) {
        Object.assign(period, period._editSnapshot);
        period._editSnapshot = null;
    }
    period.isEditing = false;
    render();
};
window.savePeriodEdit = (id) => {
    const period = periods.find(p => p.id === id);
    const newName = document.getElementById(`edit-p-name-${id}`).value.trim();
    if (!newName) { showError('期間名称を入力してください'); return; }

    if (canEditPeriodDate(period)) {
        const newFrom = document.getElementById(`edit-p-from-${id}`).value;
        const newTo   = document.getElementById(`edit-p-to-${id}`).value;
        if (newFrom > newTo) { showError('受付終了日は受付開始日以降の日付を入力してください'); return; }
        period.from = newFrom;
        period.to   = newTo;
    }
    period.name = newName;
    period.isEditing = false;
    period._editSnapshot = null;
    render();
};

// 開講日 編集
window.addSession = (periodId) => {
    if (!canAddSession()) { showError(ERR.siteAfter); return; }
    const openVal  = document.getElementById(`open-${periodId}`).value;
    const limitVal = document.getElementById(`limit-${periodId}`).value;
    if (!openVal || !limitVal) { showError('開講日と申込締切日を入力してください'); return; }
    if (openVal <= limitVal) { showError('開講日は申込締切日より後の日付を入力してください（開講日 > 申込締切日）'); return; }
    periods.find(p => p.id === periodId).sessions.push({
        id: Date.now(), open: openVal, limit: limitVal, isEditing: false, _snapshot: null
    });
    render();
};
window.startSessionEdit = (pId, sId) => {
    event.stopPropagation();
    const period  = periods.find(p => p.id === pId);
    const session = period.sessions.find(s => s.id === sId);
    if (!canEditSession(session)) { showError(ERR.sessionEditActive); return; }
    session._snapshot = { open: session.open, limit: session.limit };
    period.sessions.forEach(s => s.isEditing = (s.id === sId));
    render();
};
window.saveSessionEdit = (pId, sId) => {
    const period  = periods.find(p => p.id === pId);
    const session = period.sessions.find(s => s.id === sId);
    const newOpen  = document.getElementById(`edit-open-${sId}`).value;
    const newLimit = document.getElementById(`edit-limit-${sId}`).value;

    // 申込締切日の変更チェック（前倒し禁止）
    if (newLimit < session.limit) { showError(ERR.deadlineAdvance); return; }
    // 申込締切日が過去かどうか
    if (getSessionPhase(session) === 'past') { showError(ERR.deadlinePast); return; }
    if (newOpen <= newLimit) { showError('開講日は申込締切日より後の日付を入力してください'); return; }

    if (canEditSession(session)) session.open  = newOpen;
    session.limit = newLimit;
    session.isEditing = false;
    session._snapshot = null;
    render();
};
window.cancelSessionEdit = (pId, sId) => {
    const session = periods.find(p => p.id === pId).sessions.find(s => s.id === sId);
    if (session._snapshot) { Object.assign(session, session._snapshot); session._snapshot = null; }
    session.isEditing = false;
    render();
};
window.deleteSession = (pId, sId) => {
    event.stopPropagation();
    const period  = periods.find(p => p.id === pId);
    const session = period.sessions.find(s => s.id === sId);
    if (!canDeleteSession(session)) { showError(ERR.sessionDeleteActive); return; }
    period.sessions = period.sessions.filter(s => s.id !== sId);
    render();
};
window.deletePeriod = (id) => {
    event.stopPropagation();
    const period = periods.find(p => p.id === id);
    if (!canDeletePeriod(period)) {
        const ph = getPeriodPhase(period);
        if (ph === 'active' || ph === 'past') showError(ERR.periodDeleteActive);
        else if (sitePhase === 'after') showError(ERR.siteAfter);
        else showError('公開中は削除できません');
        return;
    }
    if (confirm('この申込期間と、紐づく開講日をすべて削除しますか？')) {
        periods = periods.filter(p => p.id !== id);
        if (activeAccordionId === id) activeAccordionId = null;
        render();
    }
};

// ===== フッターボタン =====
document.getElementById('btn-cancel').addEventListener('click', () => {
    if (confirm('変更を破棄してモーダルを閉じますか？')) {
        alert('[デモ] キャンセル → モーダルを閉じる');
    }
});
document.getElementById('btn-submit').addEventListener('click', () => {
    // 実装時はここでAPIに送信
    alert('[デモ] 登録する → DBに一括保存して閉じる\n\nchkNoPeriod: ' + chkNoPeriod.checked
        + '\n期間数: ' + periods.length);
});

// ===== デモコントロール =====
document.getElementById('demo-today').textContent = TODAY;
document.querySelectorAll('input[name="demo-phase"]').forEach(radio => {
    radio.addEventListener('change', () => {
        sitePhase = radio.value;
        render();
    });
});

document.getElementById('btn-load-demo').addEventListener('click', () => {
    // サンプルデータ（今日基準）
    periods = [
        {
            id: 1, name: '募集開始前',
            from: addDays(TODAY, 30), to: addDays(TODAY, 90),
            isEditing: false, _editSnapshot: null,
            sessions: [
                { id: 101, open: addDays(TODAY, 60), limit: addDays(TODAY, 45), isEditing: false, _snapshot: null },
            ]
        },
        {
            id: 2, name: '募集進行中',
            from: addDays(TODAY, -10), to: addDays(TODAY, 20),
            isEditing: false, _editSnapshot: null,
            sessions: [
                { id: 201, open: addDays(TODAY, 15), limit: addDays(TODAY, 5), isEditing: false, _snapshot: null },
                { id: 202, open: addDays(TODAY, -5), limit: addDays(TODAY, -15), isEditing: false, _snapshot: null },
            ]
        },
        {
            id: 3, name: '募集終了済',
            from: addDays(TODAY, -120), to: addDays(TODAY, -60),
            isEditing: false, _editSnapshot: null,
            sessions: [
                { id: 301, open: addDays(TODAY, -70), limit: addDays(TODAY, -80), isEditing: false, _snapshot: null },
            ]
        },
    ];
    activeAccordionId = 1;
    render();
});

// ===== 初期表示 =====
render();
</script>
