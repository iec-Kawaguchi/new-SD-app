<!DOCTYPE html>
<html lang="ja" class="h-full bg-gray-50">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>企業設定 - New SD App</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
        
        <link rel="stylesheet" href="./css/base-style.css">
        <script src="./js/role-visibility.js" defer></script>
        <script src="./js/mock-ui.js" defer></script>
        
        <style>
            /* カスタムスクロールバー */
            ::-webkit-scrollbar { width: 6px; height: 6px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
            ::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
            
            /* アイコンサイズの調整ユーティリティ */
            .icon-sm { font-size: 20px; }
            .icon-md { font-size: 24px; }
        </style>
    </head>
    <body class="h-full text-gray-900 antialiased flex flex-col">
        <div id="app-header"></div>

        <div class="flex flex-1 overflow-hidden">
            <div id="app-sidebar"></div>

            <main class="flex-1 h-full overflow-y-auto bg-gray-50 p-6 lg:p-8">
                <div class="max-w-6xl mx-auto h-full flex flex-col">
                    
                    <div class="mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="flex flex-col">
                            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">CORP-00123.〇〇食品株式会社</h1>
                            <p class="text-sm text-gray-500 mt-1">システムで利用する企業ロゴやキャンセルポリシーを設定します。</p>
                        </div>
                        
                        <div class="flex items-center gap-3 w-full md:w-auto bg-white p-2 md:p-0 md:bg-transparent rounded-lg md:rounded-none shadow-sm md:shadow-none border md:border-none border-gray-200" data-visible-for="iec">
                            <span class="text-sm font-bold text-gray-700 whitespace-nowrap hidden md:inline">対象企業:</span>
                            <div class="relative w-full md:w-64">
                                <select class="h-10 appearance-none bg-white md:bg-gray-50 border border-gray-300 text-gray-700 text-sm rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block w-full pl-3 pr-8 leading-tight transition-colors shadow-sm md:shadow-none">
                                    <option value="1">〇〇食品株式会社</option>
                                    <option value="2">テスト企業A</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-500">
                                    <span class="material-symbols-outlined icon-sm">expand_more</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col mb-6">
                        <div class="p-5 border-b border-gray-100 bg-gray-50/50">
                            <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
                                <span class="material-symbols-outlined text-gray-400 icon-sm">domain</span>
                                基本情報
                            </h2>
                            <p class="text-xs text-gray-500 mt-1 ml-7">※企業名などの基本情報は基幹システムと連携しているため、ここでは編集できません。</p>
                        </div>
                        <div class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="col-span-1 md:col-span-1">
                                <span class="block text-sm font-bold text-gray-700 mb-1.5">企業ID</span>
                                <div class="text-gray-600 bg-gray-50 px-3 py-2.5 rounded-md border border-gray-200 text-sm font-mono">
                                    CORP-00123
                                </div>
                            </div>
                            <div class="col-span-1 md:col-span-2">
                                <span class="block text-sm font-bold text-gray-700 mb-1.5">企業名</span>
                                <div class="text-gray-900 bg-gray-50 px-3 py-2.5 rounded-md border border-gray-200 text-sm font-medium">
                                    〇〇食品株式会社
                                </div>

                        </div>
                    </div> -->

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col mb-6">
                        <div class="p-5 border-b border-gray-100">
                            <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
                                <span class="material-symbols-outlined text-gray-400 icon-sm">image</span>
                                企業ロゴ
                            </h2>
                            <p class="text-sm text-gray-500 mt-1 ml-7">募集サイトのロゴとして使用されるロゴ画像を設定します。</p>
                        </div>
                        <div class="p-6">
                            <div class="flex flex-col md:flex-row gap-8 items-start">
                                <div class="flex flex-col gap-2 w-full md:w-56 shrink-0">
                                    <span class="text-sm font-bold text-gray-700">現在のロゴ</span>
                                    <div class="w-full aspect-video bg-gray-50 border border-gray-200 rounded-lg flex items-center justify-center overflow-hidden relative group">
                                        <div class="flex flex-col items-center justify-center text-gray-400">
                                            <span class="material-symbols-outlined text-4xl mb-1">hide_image</span>
                                            <span class="text-xs">未登録</span>
                                        </div>
                                    </div>
                                </div>

                                <div class="flex flex-col gap-2 w-full flex-1">
                                    <span class="text-sm font-bold text-gray-700">画像のアップロード</span>
                                    <div class="flex justify-center rounded-lg border-2 border-dashed border-gray-300 px-6 py-8 hover:bg-gray-50 hover:border-blue-400 transition-colors cursor-pointer group">
                                        <div class="text-center">
                                            <span class="material-symbols-outlined text-gray-400 text-4xl mb-2 group-hover:text-blue-500 transition-colors">cloud_upload</span>
                                            <div class="mt-2 flex text-sm leading-6 text-gray-600 justify-center">
                                                <label for="file-upload" class="relative cursor-pointer rounded-md bg-transparent font-semibold text-blue-600 focus-within:outline-none focus-within:ring-2 focus-within:ring-blue-600 focus-within:ring-offset-2 hover:text-blue-500">
                                                    <span>ファイルを選択</span>
                                                    <input id="file-upload" name="file-upload" type="file" class="sr-only" accept="image/png, image/jpeg, image/svg+xml">
                                                </label>
                                                <p class="pl-1">またはドラッグ＆ドロップ</p>
                                            </div>
                                            <p class="text-xs leading-5 text-gray-500 mt-2">PNG, JPG, SVG (最大 2MB)</p>
                                            <p class="text-xs leading-5 text-gray-500">推奨サイズ: 400x100px</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col mb-6">
                        <div class="p-5 border-b border-gray-100">
                            <h2 class="text-base font-bold text-gray-800 flex items-center gap-2">
                                <span class="material-symbols-outlined text-gray-400 icon-sm">policy</span>
                                キャンセルポリシー
                            </h2>
                            <p class="text-sm text-gray-500 mt-1 ml-7">独自キャンセルポリシーを登録できます。未設定の場合は標準のキャンセルポリシーが適用されます。</p>
                        </div>
                        <div class="p-6 flex flex-col gap-5">
                            
                            <!-- <div class="flex flex-col gap-1.5">
                                <label for="policyTitle" class="text-sm font-bold text-gray-700">タイトル <span class="text-red-500">*</span></label>
                                <input id="policyTitle" type="text" class="w-full rounded-md border border-gray-300 px-3 py-2.5 text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 shadow-sm sm:text-sm transition-shadow" placeholder="例：研修受講のキャンセルについて" value="キャンセルポリシー">
                            </div> -->
                            
                            <div class="flex flex-col gap-1.5">
                                <!-- <label for="policyBody" class="text-sm font-bold text-gray-700">本文 <span class="text-red-500">*</span></label> -->
                                <div class="border border-gray-300 rounded-md shadow-sm overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-shadow">
                                    
                                    <div class="bg-gray-50 border-b border-gray-300 px-2 py-1.5 flex items-center gap-1 overflow-x-auto">
                                        <button type="button" class="p-1.5 text-gray-500 hover:text-gray-800 hover:bg-gray-200 rounded transition-colors" title="太字"><span class="material-symbols-outlined icon-sm">format_bold</span></button>
                                        <button type="button" class="p-1.5 text-gray-500 hover:text-gray-800 hover:bg-gray-200 rounded transition-colors" title="斜体"><span class="material-symbols-outlined icon-sm">format_italic</span></button>
                                        <div class="w-px h-5 bg-gray-300 mx-1"></div>
                                        <button type="button" class="p-1.5 text-gray-500 hover:text-gray-800 hover:bg-gray-200 rounded transition-colors" title="箇条書き"><span class="material-symbols-outlined icon-sm">format_list_bulleted</span></button>
                                        <button type="button" class="p-1.5 text-gray-500 hover:text-gray-800 hover:bg-gray-200 rounded transition-colors" title="番号付きリスト"><span class="material-symbols-outlined icon-sm">format_list_numbered</span></button>
                                        <div class="w-px h-5 bg-gray-300 mx-1"></div>
                                        <button type="button" class="p-1.5 text-gray-500 hover:text-gray-800 hover:bg-gray-200 rounded transition-colors" title="リンク"><span class="material-symbols-outlined icon-sm">link</span></button>
                                    </div>
                                    
                                    <textarea id="policyBody" rows="10" class="w-full px-4 py-3 text-gray-900 focus:outline-none sm:text-sm border-0 resize-y" placeholder="キャンセルポリシーを入力してください。"></textarea>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="flex justify-end gap-3 mt-2 mb-10 pt-4 border-t border-gray-200">
                        <button type="button" class="px-5 py-2.5 rounded-md bg-white border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 hover:border-gray-400 transition-all shadow-sm">
                            変更を破棄
                        </button>
                        <button type="button" class="px-6 py-2.5 rounded-md bg-blue-600 text-white font-bold hover:bg-blue-700 shadow-sm hover:shadow active:scale-95 transition-all flex items-center gap-2">
                            <span class="material-symbols-outlined icon-sm">save</span>
                            保存する
                        </button>
                    </div>

                </div>
            </main>
        </div>

        <script type="module">
            window.addEventListener('DOMContentLoaded', () => {
                // --- MockUI初期化 ---
                if (typeof MockUI !== 'undefined') {
                    MockUI.injectHeader('#app-header', {
                        userName: 'Test User',
                        brand: 'New SD App',
                        initialRole: 'iec',
                    });
                    MockUI.injectSidebar('#app-sidebar');
                }
            });
        </script>
    </body>
</html>
